app-id: io.github.lavenderdotpet.LibreQuake
runtime: org.freedesktop.Platform
runtime-version: "23.08"
sdk: org.freedesktop.Sdk
command: io.github.lavenderdotpet.LibreQuake.sh

finish-args:
  # Wayland and X11 fallback
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # Audio and hardware 3D
  - --device=dri
  - --socket=pulseaudio
  # Input devices
  - --device=all  # Change to device=input once resolved. See https://discourse.flathub.org/t/support-for-device-input/6645  and https://github.com/flatpak/flatpak/issues/5681
  # Network
  - --share=network
  # Set SDL environment variables to try and fix window icon
  - --env=SDL_VIDEO_WAYLAND_WMCLASS=io.github.lavenderdotpet.LibreQuake
  - --env=SDL_VIDEO_X11_WMCLASS=io.github.lavenderdotpet.LibreQuake

cleanup:
  - /app/include
  - /app/bin/spirv*
  - /app/bin/fteqcc
  - /app/games
  - /app/lib/cmake
  - /app/lib/debug
  - /app/lib/libSPIRV*.a
  - /app/lib/pkgconfig
  - /app/share/applications/fteqw.desktop

modules:
  # Dependencies
  - shared-modules/libmad/libmad.json
  - name: libxmp
    buildsystem: autotools
    sources:
      - type: archive
        url: https://api.github.com/repos/libxmp/libxmp/zipball/libxmp-4.6.0
        dest-filename: libxmp.zip
        sha256: 1955a7c7eb2e6c3ba2da689d115d10f89c6e5e261577e67cd0ad176bea1b97ef
        x-checker-data:
          type: json
          url: https://api.github.com/repos/libxmp/libxmp/releases/latest
          version-query: .tag_name | sub("^libxmp-"; "")
          url-query: .zipball_url
  - name: spirv-tools
    buildsystem: cmake-ninja
    builddir: true
    sources:
      - type: archive
        url: https://api.github.com/repos/KhronosGroup/SPIRV-Tools/zipball/vulkan-sdk-1.3.296.0
        sha256: e185f6f5de99bf426487e12ed705d6a6ef87f1a780457bb8e2a43e14ef13f8a0
        dest-filename: spirv-tools.zip
        x-checker-data:
          type: json
          url: https://api.github.com/repos/KhronosGroup/SPIRV-Tools/releases/latest
          version-query: .tag_name | sub("vulkan-sdk-"; "")
          url-query: .zipball_url
      - type: archive
        url: https://api.github.com/repos/KhronosGroup/SPIRV-Headers/zipball/vulkan-sdk-1.3.296.0
        sha256: 35504076dbd25a7d82d37183f13d668c6f16f2e036798f2ebc906da4f68d0037
        dest-filename: spirv-headers.zip
        dest: external/spirv-headers
        x-checker-data:
          type: json
          url: https://api.github.com/repos/KhronosGroup/SPIRV-Headers/releases/latest
          version-query: .tag_name | sub("vulkan-sdk-"; "")
          url-query: .zipball_url

  # Engines
  - engines/io.github.sezero.quakespasm.yml
  - engines/io.github.andrei_drexler.ironwail.yml
  - engines/com.quakeone.qssm.yml
  - engines/io.github.novum.vkquake.yml
  - engines/org.fteqw.fteqw.yml
  - engines/net.disenchant.tyrquake.yml

  # Metadata
  - name: support-files
    buildsystem: simple
    sources:
      - type: file
        url: https://raw.githubusercontent.com/lavenderdotpet/LibreQuake/v0.08-beta/docs/flatpak-metadata/io.github.lavenderdotpet.LibreQuake.svg
        sha256: "9ebe794eed8d4a27db3f06ad6002390472c32b31fa6b22ffa945543cf3cca222"
        dest-filename: io.github.lavenderdotpet.LibreQuake.svg
        x-checker-data:
          type: json
          url: https://api.github.com/repos/lavenderdotpet/LibreQuake/releases/latest
          version-query: .tag_name
          url-query: ("https://raw.githubusercontent.com/lavenderdotpet/LibreQuake/" + .tag_name + "/docs/flatpak-metadata/io.github.lavenderdotpet.LibreQuake.svg")
      - type: file
        url: https://raw.githubusercontent.com/lavenderdotpet/LibreQuake/v0.08-beta/docs/flatpak-metadata/io.github.lavenderdotpet.LibreQuake.desktop
        sha256: "0e02f35b97dc4a490d3a0055d4e2370739493ce63a001c3467b2f418fa8cb582"
        dest-filename: io.github.lavenderdotpet.LibreQuake.desktop
        x-checker-data:
          type: json
          url: https://api.github.com/repos/lavenderdotpet/LibreQuake/releases/latest
          version-query: .tag_name
          url-query: ("https://raw.githubusercontent.com/lavenderdotpet/LibreQuake/" + .tag_name + "/docs/flatpak-metadata/io.github.lavenderdotpet.LibreQuake.desktop")
      - type: file
        url: https://raw.githubusercontent.com/lavenderdotpet/LibreQuake/35c17070c9dfd2da484a369777cbffeb87a0c4c2/docs/flatpak-metadata/io.github.lavenderdotpet.LibreQuake.metainfo.xml
        sha256: "065f84f94b58354b2b6e6a913cfbd9cb11bd29894ba27d6780fc05b6210eb5ee"
        dest-filename: io.github.lavenderdotpet.LibreQuake.metainfo.xml
        x-checker-data:
          type: json
          url: https://api.github.com/repos/lavenderdotpet/LibreQuake/releases/latest
          version-query: .tag_name
          url-query: ("https://raw.githubusercontent.com/lavenderdotpet/LibreQuake/" + .tag_name + "/docs/flatpak-metadata/io.github.lavenderdotpet.LibreQuake.metainfo.xml")
      - type: file
        path: io.github.lavenderdotpet.LibreQuake.sh
      - type: file
        path: io.github.lavenderdotpet.LibreQuake.launcher.sh
      - type: file
        path: io.github.lavenderdotpet.LibreQuake.desktop
      - type: file
        path: engines/io.github.sezero.quakespasm.png
      - type: file
        path: engines/net.disenchant.tyrquake.png
      - type: file
        path: engines/org.fteqw.fteqw.png
    build-commands:
      - install -Dm755 *.sh -t /app/bin/
      - mkdir -p /app/extra/librequake
      - install -Dm644 io.github.lavenderdotpet.LibreQuake.svg -t /app/share/icons/hicolor/scalable/apps/
      - install -Dm644 io.github.lavenderdotpet.LibreQuake.metainfo.xml -t /app/share/metainfo/
      # Desktop file for the main game
      - install -Dm644 io.github.lavenderdotpet.LibreQuake.desktop -t /app/share/applications/
      - desktop-file-edit --set-key=Exec --set-value="io.github.lavenderdotpet.LibreQuake.sh" /app/share/applications/io.github.lavenderdotpet.LibreQuake.desktop
      # Desktop file for the launcher
      - install -m644 io.github.lavenderdotpet.LibreQuake.desktop /app/share/applications/io.github.lavenderdotpet.LibreQuake.launcher.desktop
      - desktop-file-edit --set-key=Name --set-value="LibreQuake Launcher" /app/share/applications/io.github.lavenderdotpet.LibreQuake.launcher.desktop
      - desktop-file-edit --set-key=Exec --set-value="io.github.lavenderdotpet.LibreQuake.launcher.sh" /app/share/applications/io.github.lavenderdotpet.LibreQuake.launcher.desktop
      # Icons for the engines
      - install -Dm644 io.github.sezero.quakespasm.png /app/share/icons/hicolor/256x256/apps/io.github.lavenderdotpet.LibreQuake.quakespasm.png
      - install -Dm644 net.disenchant.tyrquake.png /app/share/icons/hicolor/256x256/apps/io.github.lavenderdotpet.LibreQuake.tyrquake.png
      - install -Dm644 org.fteqw.fteqw.png /app/share/icons/hicolor/256x256/apps/io.github.lavenderdotpet.LibreQuake.fteqw.png

  - name: librequake-data
    sources:
      - type: extra-data
        filename: librequake.zip
        url: "https://github.com/lavenderdotpet/LibreQuake/releases/download/v0.08-beta/full.zip"
        sha256: "b360ff9b2ba3c01da79616fb8d433abe4bbcbe38ec10b8eb71884eba3ac09534"
        size: 193985987
        x-checker-data:
          type: json
          url: https://api.github.com/repos/lavenderdotpet/LibreQuake/releases/latest
          version-query: .tag_name
          url-query: .assets[] | select(.name=="full.zip") | .browser_download_url
      - type: script
        dest-filename: apply_extra
        commands:
          - mkdir -p /app/extra/librequake
          - unzip librequake.zip -d lqtmp && rm librequake.zip
          - mv -v $(find lqtmp -name "id1") /app/extra/librequake/
          # Move fteqw's csaddon and menusys to id1
          - cp /app/share/games/quake/id1/*.pk3 /app/extra/librequake/id1/
          - rm -rf lqtmp
    buildsystem: simple
    build-commands:
      - install -Dm755 apply_extra /app/bin/apply_extra
